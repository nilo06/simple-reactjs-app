name: React CI/CD Simple

# Déclenche le workflow à chaque push sur main
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Récupérer le code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Installer Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3️⃣ Installer les dépendances
      - name: Install dependencies
        run: npm install

      # 4️⃣ Build l’application React
      - name: Build React app
        run: npm run build

      # 5️⃣ Copier le build dans le dossier GitHub Pages
      # Ici on ne push pas nous-mêmes, GitHub Pages lira automatiquement le dossier `build`
      - name: Ready for GitHub Pages
        run: echo "React build ready in ./build"