name: React CI/CD - Déploiement

# Déclenchement à chaque push sur main
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Installer Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3️⃣ Installer les dépendances
      - name: Installer dépendances
        run: npm install

      # 4️⃣ Construire le projet React
      - name: Build React
        run: npm run build

      # 5️⃣ Copier le contenu build/ dans main/ pour GitHub Pages
      - name: Déploiement GitHub Pages
        run: |
          cp -r build/* .
          echo "Site déployé depuis main branch pour GitHub Pages"